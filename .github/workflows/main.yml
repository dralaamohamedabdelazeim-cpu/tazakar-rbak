name: Build and Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 18
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias eltaweel \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass eltaweel123 \
            -keypass eltaweel123 \
            -dname "CN=eltaweel, O=eltaweel, C=EG"

      - name: Build Signed Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
            -Pandroid.injected.signing.store.password=eltaweel123 \
            -Pandroid.injected.signing.key.alias=eltaweel \
            -Pandroid.injected.signing.key.password=eltaweel123 \
            --no-daemon

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: محمد عبد العظيم اذكر ربك - إصدار ${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
